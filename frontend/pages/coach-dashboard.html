<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F2F2F7">
  <title>Mes clients — AppKcal Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    /* ── Header ────────────────────────────── */
    .coach-header {
      padding: calc(env(safe-area-inset-top) + 18px) 16px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .coach-header__back {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(8px);
      border: 0.5px solid var(--border-default);
      color: var(--text-primary);
      font-size: 18px;
      flex-shrink: 0;
    }
    .coach-header__title {
      font-size: 1.25rem; font-weight: 700; flex: 1;
    }
    .coach-header__action {
      background: var(--text-primary);
      color: var(--text-inverse);
      border-radius: var(--radius-pill);
      padding: 8px 14px;
      font-size: 13px; font-weight: 600;
      min-height: 36px;
    }

    /* ── Stats bar ─────────────────────────── */
    .coach-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 0 16px 16px;
    }
    .coach-stat {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 0.5px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 12px;
      text-align: center;
    }
    .coach-stat__val {
      font-family: var(--font-mono);
      font-size: 1.5rem; font-weight: 700;
      line-height: 1;
    }
    .coach-stat__lbl {
      font-size: 11px; color: var(--text-tertiary);
      margin-top: 4px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .coach-stat--green  .coach-stat__val { color: #16a34a; }
    .coach-stat--orange .coach-stat__val { color: #d97706; }
    .coach-stat--red    .coach-stat__val { color: #dc2626; }

    /* ── Client cards ──────────────────────── */
    .clients-list {
      display: flex; flex-direction: column; gap: 10px;
      padding: 0 16px 16px;
    }
    .client-card {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 0.5px solid var(--glass-border);
      border-radius: var(--radius-lg);
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px 12px 0;
      min-height: 72px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, opacity 0.1s;
    }
    .client-card:active { transform: scale(0.98); opacity: 0.9; }
    .client-card__bar {
      width: 4px; align-self: stretch; flex-shrink: 0;
      border-radius: 2px;
      margin-left: 0;
    }
    .client-card__bar--green  { background: #16a34a; }
    .client-card__bar--orange { background: #d97706; }
    .client-card__bar--red    { background: #dc2626; }
    .client-card__avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--bg-tertiary);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: var(--text-secondary);
      font-size: 15px; flex-shrink: 0;
      overflow: hidden;
      border: 0.5px solid var(--border-default);
    }
    .client-card__avatar img { width: 100%; height: 100%; object-fit: cover; }
    .client-card__body { flex: 1; min-width: 0; }
    .client-card__top {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 4px;
    }
    .client-card__name {
      font-weight: 600; font-size: 15px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .client-card__meta {
      font-size: 12px; color: var(--text-tertiary);
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 6px;
    }
    .client-card__kcal {
      font-size: 12px; font-family: var(--font-mono);
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .client-card__progress {
      width: 100%; height: 4px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-pill);
      overflow: hidden;
    }
    .client-card__progress-fill {
      height: 100%;
      background: var(--text-primary);
      border-radius: var(--radius-pill);
      transition: width 0.3s ease;
    }
    .client-card__arrow {
      color: var(--text-tertiary);
      font-size: 22px; line-height: 1;
      flex-shrink: 0;
    }

    /* ── Bottom sheet invitation ───────────── */
    .sheet {
      position: fixed; inset: 0;
      z-index: 1000; pointer-events: none; opacity: 0;
    }
    .sheet.is-open { pointer-events: auto; opacity: 1; }
    .sheet__overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.45);
      opacity: 0; transition: opacity 0.25s ease;
    }
    .sheet.is-open .sheet__overlay { opacity: 1; }
    .sheet__panel {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: #fff;
      border-radius: 16px 16px 0 0;
      padding: 0 18px calc(env(safe-area-inset-bottom) + 24px);
      max-height: 92dvh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .sheet.is-open .sheet__panel { transform: translateY(0); }
    .sheet__handle {
      width: 36px; height: 4px;
      background: #E5E5EA;
      border-radius: 2px;
      margin: 10px auto 18px;
    }
    .sheet__title {
      font-size: 17px; font-weight: 700;
      margin: 0 0 18px; text-align: center;
    }
  </style>
</head>
<body>

<header class="coach-header">
  <button class="coach-header__back" onclick="navigate('/pages/dashboard.html')" aria-label="Retour">←</button>
  <div class="coach-header__title">Mes clients</div>
  <button class="coach-header__action" id="invite-btn">+ Inviter</button>
</header>

<!-- Stats -->
<div class="coach-stats" id="stats" style="display:none">
  <div class="coach-stat coach-stat--green">
    <div class="coach-stat__val" id="stat-green">0</div>
    <div class="coach-stat__lbl">À jour</div>
  </div>
  <div class="coach-stat coach-stat--orange">
    <div class="coach-stat__val" id="stat-orange">0</div>
    <div class="coach-stat__lbl">Hier</div>
  </div>
  <div class="coach-stat coach-stat--red">
    <div class="coach-stat__val" id="stat-red">0</div>
    <div class="coach-stat__lbl">À relancer</div>
  </div>
</div>

<main class="page">
  <div id="clients-container" class="clients-list">
    <!-- Skeletons -->
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
  </div>

  <div id="empty-state" class="empty-state" style="display:none">
    <div class="icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:.5">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <polyline points="17 11 19 13 23 9"/>
      </svg>
    </div>
    <h3>Aucun client pour l'instant</h3>
    <p>Invitez votre premier client pour commencer le suivi.</p>
    <button class="btn btn--primary mt-16" id="empty-invite-btn">+ Inviter un client</button>
  </div>
</main>

<!-- Sheet : invitation -->
<div class="sheet" id="invite-sheet" role="dialog" aria-modal="true" aria-label="Inviter un client">
  <div class="sheet__overlay" id="invite-overlay"></div>
  <div class="sheet__panel">
    <div class="sheet__handle"></div>
    <h2 class="sheet__title">Inviter un client</h2>

    <form id="invite-form" novalidate>
      <div class="form-group mb-16">
        <label class="form-label" for="invite-email">Email du client</label>
        <input class="form-input" type="email" id="invite-email" placeholder="client@exemple.com" required>
      </div>

      <div class="form-group mb-16">
        <label class="form-label" for="invite-type">Type de coaching</label>
        <select class="form-input" id="invite-type" required>
          <option value="nutrition">Nutrition</option>
          <option value="sport">Sport</option>
          <option value="both">Les deux</option>
        </select>
      </div>

      <div style="display:flex;gap:10px">
        <button type="button" class="btn btn--ghost" style="flex:1" id="invite-cancel">Annuler</button>
        <button type="submit" class="btn btn--primary" style="flex:2" id="invite-submit">Envoyer l'invitation</button>
      </div>
    </form>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <a class="nav-item" href="/pages/dashboard.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Accueil
  </a>
  <a class="nav-item" href="/pages/feed.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Feed
  </a>
  <a class="nav-item nav-item--fab" href="/pages/photo.html">
    <div class="nav-fab-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" stroke="#fff"/><circle cx="12" cy="13" r="4" stroke="#fff"/></svg>
    </div>
    <span>Photo IA</span>
  </a>
  <a class="nav-item" href="/pages/sport.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6.5 6.5h11M6.5 17.5h11M3 12h18M7 3l-4 9 4 9M17 3l4 9-4 9"/></svg>
    Sport
  </a>
  <a class="nav-item active" id="nav-coach" href="/pages/coach-dashboard.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></svg>
    Coach
  </a>
  <a class="nav-item" href="/pages/calendar.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Calendrier
  </a>
</nav>

<div id="toast-container"></div>

<script src="/js/api.js"></script>
<script>
const GOAL_LABELS = { bulk: 'Masse', cut: 'Sèche', maintain: 'Maintien', rebalance: 'Rééquilibrage' };

// ── Guard ───────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  if (!requireAuth()) return;

  const user = getUser();
  if (!user?.is_coach) {
    // Tentative de récupération via le profil coach (ignorer si 404)
    try {
      await API.coach.getProfile();
      // OK : on est coach mais la flag locale est désynchro
      const u = getUser();
      if (u) { u.is_coach = true; setUser(u); }
    } catch {
      toast('Accès réservé aux coaches', 'error');
      setTimeout(() => navigate('/pages/dashboard.html'), 800);
      return;
    }
  }

  await loadClients();

  // Wire invite buttons
  document.getElementById('invite-btn').addEventListener('click', openInviteSheet);
  document.getElementById('empty-invite-btn').addEventListener('click', openInviteSheet);
  document.getElementById('invite-cancel').addEventListener('click', closeInviteSheet);
  document.getElementById('invite-overlay').addEventListener('click', closeInviteSheet);
  document.getElementById('invite-form').addEventListener('submit', submitInvite);
});

// ── Load clients ───────────────────────────
async function loadClients() {
  const container = document.getElementById('clients-container');
  const stats = document.getElementById('stats');
  const empty = document.getElementById('empty-state');

  try {
    const clients = await API.coach.getClients();

    if (!clients || clients.length === 0) {
      container.style.display = 'none';
      stats.style.display = 'none';
      empty.style.display = 'block';
      return;
    }

    // Stats par color_status
    const counts = { green: 0, orange: 0, red: 0 };
    for (const c of clients) counts[c.color_status] = (counts[c.color_status] || 0) + 1;
    document.getElementById('stat-green').textContent  = counts.green;
    document.getElementById('stat-orange').textContent = counts.orange;
    document.getElementById('stat-red').textContent    = counts.red;
    stats.style.display = 'grid';
    empty.style.display = 'none';

    container.innerHTML = clients.map(renderClientCard).join('');

    // Click handlers
    container.querySelectorAll('.client-card').forEach(card => {
      card.addEventListener('click', () => {
        navigate('/pages/coach-client.html?id=' + encodeURIComponent(card.dataset.clientId));
      });
    });
  } catch (err) {
    console.error('[coach-dashboard] loadClients', err);
    container.innerHTML = '';
    empty.style.display = 'block';
    empty.querySelector('h3').textContent = 'Erreur de chargement';
    empty.querySelector('p').textContent = err.message || 'Réessaie dans un instant';
  }
}

// ── Render card ────────────────────────────
function renderClientCard(c) {
  const profile = c.profile || {};
  const name = profile.username || 'Client';
  const initial = (name[0] || '?').toUpperCase();
  const goal = profile.goal ? `<span class="pill">${GOAL_LABELS[profile.goal] || profile.goal}</span>` : '';
  const target = profile.daily_kcal_target || 2000;
  const consumed = c.kcal_today ?? 0; // backend ne fournit pas encore — placeholder
  const pct = Math.min(100, Math.round((consumed / target) * 100));

  const avatar = profile.avatar_url
    ? `<img src="${escapeHtml(profile.avatar_url)}" alt="">`
    : initial;

  return `
    <div class="client-card" data-client-id="${escapeHtml(c.client_id)}">
      <div class="client-card__bar client-card__bar--${c.color_status}"></div>
      <div class="client-card__avatar">${avatar}</div>
      <div class="client-card__body">
        <div class="client-card__top">
          <span class="client-card__name">${escapeHtml(name)}</span>
          ${goal}
        </div>
        <div class="client-card__kcal">${consumed} / ${target} kcal</div>
        <div class="client-card__progress">
          <div class="client-card__progress-fill" style="width:${pct}%"></div>
        </div>
      </div>
      <div class="client-card__arrow">›</div>
    </div>
  `;
}

// ── Invite sheet ───────────────────────────
function openInviteSheet() {
  document.getElementById('invite-sheet').classList.add('is-open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('invite-email').focus(), 350);
}
function closeInviteSheet() {
  document.getElementById('invite-sheet').classList.remove('is-open');
  document.body.style.overflow = '';
  document.getElementById('invite-form').reset();
}

async function submitInvite(e) {
  e.preventDefault();
  const email = document.getElementById('invite-email').value.trim();
  const type  = document.getElementById('invite-type').value;
  if (!email) { toast('Email requis', 'error'); return; }

  const btn = document.getElementById('invite-submit');
  setLoading(btn, true);
  try {
    await API.coach.inviteClient({ client_email: email, coach_type: type });
    toast('Invitation envoyée !', 'success');
    closeInviteSheet();
    await loadClients();
  } catch (err) {
    toast(err.message || 'Erreur', 'error');
  } finally {
    setLoading(btn, false);
  }
}

// ── Helpers ────────────────────────────────
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
</script>
</body>
</html>
