<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#6B7C45">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Connexion — AppKcal</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body data-page="login">

<div class="auth-page">

  <!-- ── VUE LOGIN ──────────────────────────────────────────── -->
  <div id="login-view">
    <div class="auth-header">
      <div class="auth-logo">🥗</div>
      <h1 class="auth-title">Bon retour !</h1>
      <p class="auth-subtitle">Connecte-toi pour suivre ta nutrition</p>
    </div>

    <div class="auth-body">
      <form id="login-form" novalidate>
        <div class="form-group mb-16">
          <label class="form-label" for="email">Email</label>
          <div class="input-wrapper">
            <span class="input-icon">✉️</span>
            <input class="form-input" type="email" id="email"
              placeholder="ton@email.com" autocomplete="email" inputmode="email" required>
          </div>
        </div>

        <div class="form-group mb-16">
          <label class="form-label" for="password">Mot de passe</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input class="form-input" type="password" id="password"
              placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" class="input-toggle" id="toggle-password">👁️</button>
          </div>
        </div>

        <div class="text-right mb-16">
          <a href="#" id="forgot-link" class="text-sm text-muted">Mot de passe oublié ?</a>
        </div>

        <button type="submit" id="submit-btn" class="btn btn--primary btn--full">
          Se connecter
        </button>

        <div id="login-error" style="display:none;margin-top:14px;padding:12px 16px;background:#FEF2F2;border:1px solid #FECACA;border-radius:10px;color:#B91C1C;font-size:.875rem;font-weight:500;align-items:center;gap:8px;">
          <span>⚠️</span>
          <span id="login-error-text"></span>
        </div>
      </form>
    </div>

    <div class="auth-footer">
      Pas encore de compte ?
      <a href="/pages/register.html">S'inscrire</a>
    </div>
  </div>

  <!-- ── VUE MOT DE PASSE OUBLIÉ ────────────────────────────── -->
  <div id="forgot-panel" style="display:none">
    <div class="auth-header">
      <div class="auth-logo">🔑</div>
      <h1 class="auth-title">Mot de passe oublié</h1>
      <p class="auth-subtitle">Entre ton email pour recevoir un lien de réinitialisation</p>
    </div>

    <div class="auth-body">

      <!-- Formulaire envoi -->
      <div id="forgot-form-view">
        <div class="form-group mb-16">
          <label class="form-label" for="forgot-email">Email</label>
          <div class="input-wrapper">
            <span class="input-icon">✉️</span>
            <input class="form-input" type="email" id="forgot-email"
              placeholder="ton@email.com" autocomplete="email" inputmode="email">
          </div>
        </div>

        <div id="forgot-error" style="display:none;margin-bottom:14px;padding:12px 16px;background:#FEF2F2;border:1px solid #FECACA;border-radius:10px;color:#B91C1C;font-size:.875rem;font-weight:500;align-items:center;gap:8px;">
          <span>⚠️</span>
          <span id="forgot-error-text"></span>
        </div>

        <button id="forgot-submit-btn" class="btn btn--primary btn--full">
          Envoyer le lien
        </button>

        <div style="text-align:center;margin-top:16px">
          <a href="#" id="forgot-back-link" class="text-sm text-muted">← Retour à la connexion</a>
        </div>
      </div>

      <!-- Succès -->
      <div id="forgot-success-view" style="display:none;text-align:center;padding:8px 0">
        <div style="font-size:3rem;margin-bottom:16px">✅</div>
        <div style="font-size:1.1rem;font-weight:800;margin-bottom:10px;color:#166534">Email envoyé !</div>
        <div id="forgot-success-msg" style="font-size:.9rem;color:#374151;line-height:1.6;margin-bottom:24px"></div>
        <button class="btn btn--outline btn--full" onclick="showLoginView()">
          Retour à la connexion
        </button>
      </div>

    </div>
  </div>

</div>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
